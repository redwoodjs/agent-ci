name: "Smoke: step-level local action (uses: ./)"

# Exercises `steps[*].uses: ./.github/actions/...` — a local composite
# action resolved from the workspace, separate from reusable workflows
# (`jobs.<id>.uses: ./`). The action writes a marker file; the next step
# reads it back. We avoid `steps.<id>.outputs.*` on purpose — that context
# does not round-trip reliably from composite actions in agent-ci today.

on:
  pull_request_target:
    types: [opened, labeled, synchronize]

jobs:
  local-action:
    if: '!github.event.pull_request.draft && (contains(fromJSON(''["MEMBER", "OWNER", "COLLABORATOR"]''), github.event.pull_request.author_association) || contains(github.event.pull_request.labels.*.name, ''safe-to-run''))'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Invoke the local composite action
        uses: ./.github/actions/smoke-local-action
        with:
          tag: smoke-run-ok

      - name: Assert the marker file written by the local action exists
        run: |
          got=$(cat /tmp/agent-ci-smoke-local-action 2>/dev/null || echo MISSING)
          [ "$got" = "tag=smoke-run-ok" ] || { echo "❌ marker=$got"; exit 1; }
          echo "✅ local action resolved, ran, and wrote its marker"
