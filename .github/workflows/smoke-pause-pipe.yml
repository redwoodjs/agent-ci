name: "Smoke: pause-on-failure exits in pipe (#315)"

# Reproduces issue #315: `agent-ci run --pause-on-failure` must not hang
# forever when stdout is piped or redirected. The launcher should exit 77
# the moment the worker pauses; without the fix the pipe blocks until
# `timeout 60` kills the script (exit 124).

on:
  pull_request_target:
    types: [opened, labeled, synchronize]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".docs/**"
      - "LICENSE"

jobs:
  pause-pipe:
    if: '!github.event.pull_request.draft && (contains(fromJSON(''["MEMBER", "OWNER", "COLLABORATOR"]''), github.event.pull_request.author_association) || contains(github.event.pull_request.labels.*.name, ''safe-to-run''))'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm --filter dtu-github-actions build
      - name: agent-ci -p in a pipe must exit 77, not hang
        run: ./scripts/repro-315.sh
