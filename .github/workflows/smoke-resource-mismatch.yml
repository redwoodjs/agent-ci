name: "Smoke: resource fidelity (degraded mode)"

# Exercises the resource-fidelity classifier. The job declares an absurd
# `runs-on: ubuntu-latest-999-cores` so that on every reasonable host the
# `requestedCpuCount` (999) exceeds the host's CPU count, and agent-ci
# tags the job as `degraded` and prints a warning before execution.
#
# The workflow itself is trivial — the assertion is that the run completes
# successfully (degraded is a warning, not a failure) and that the CLI
# emitted the "in degraded mode" line. Unit coverage of the classifier
# itself lives in `packages/cli/src/workflow/resource-classifier.test.ts`.

on:
  pull_request_target:
    types: [opened, labeled, synchronize]

jobs:
  resource-mismatch:
    if: '!github.event.pull_request.draft && (contains(fromJSON(''["MEMBER", "OWNER", "COLLABORATOR"]''), github.event.pull_request.author_association) || contains(github.event.pull_request.labels.*.name, ''safe-to-run''))'
    runs-on: ubuntu-latest-999-cores
    steps:
      - name: Job runs even when host < declared runner spec
        run: echo "✅ degraded job ran to completion"
