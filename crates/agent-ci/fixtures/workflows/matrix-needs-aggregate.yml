name: Matrix Needs Aggregate
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
        os: [ubuntu, alpine]
    outputs:
      seen: ${{ steps.mark.outputs.seen }}
    steps:
      - id: mark
        run: echo "seen=${{ matrix.os }}-${{ matrix.node }}" >> $GITHUB_OUTPUT
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() && needs.test.result != 'success' }}
    steps:
      - run: echo deploy
