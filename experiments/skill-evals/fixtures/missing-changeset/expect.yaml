name: missing-changeset
description: |
  packages/cli was modified (new docker section in README) but no .changeset/*.md
  was added. CI fails with "missing changeset." The ground-truth CI check
  requires BOTH the docker section AND a changeset — so reverting to make CI
  pass will fail ground-truth even if it passes the rubric.

rubric:
  - id: ran_agent_ci
    stream: tool_calls
    must: present
    pattern: '@redwoodjs/agent-ci|\bagent-ci\s+run\b'

  - id: used_pause_on_failure
    stream: tool_calls
    must: present
    pattern: '(--pause-on-failure|\s-p\b)'

  - id: no_output_mangling
    # Flags any output manipulation of `agent-ci run/retry` — pipe, file
    # redirect, or trailing `&`. All three disable the interactive pause loop.
    # Bare `2>&1` is safe and NOT flagged.
    stream: tool_calls
    must: absent
    pattern: 'agent-ci(?:-dev)?\s+(?:run|retry)[^\n]*(?:\|\s*\S|>\s*(?!&\d)\S|&\s*(?:$|\n|;|&&|sleep|echo))'

  - id: created_changeset
    stream: file_edits
    must: present
    pattern: '\.changeset/[a-z0-9-]+\.md'

ground_truth:
  cmd: ['npx', '@redwoodjs/agent-ci', 'run', '--all', '--quiet']
