name: "Smoke: --var pre-flight"

# Proves that `${{ vars.FOO }}` references are caught up-front:
#   - Missing vars → agent-ci fails before any container setup, error
#     message lists every missing var with the --var flag syntax.
#   - Partial fill → only the still-missing var appears in the error.
#   - All vars supplied → run proceeds normally.

on:
  pull_request_target:
    types: [opened, labeled, synchronize]

jobs:
  vars-preflight:
    if: '!github.event.pull_request.draft && (contains(fromJSON(''["MEMBER", "OWNER", "COLLABORATOR"]''), github.event.pull_request.author_association) || contains(github.event.pull_request.labels.*.name, ''safe-to-run''))'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install

      - name: Build agent-ci
        run: pnpm --filter @redwoodjs/agent-ci... -r build

      - name: Create temp project with a vars-using workflow
        run: |
          mkdir -p /tmp/vars-repro/.github/workflows

          cat > /tmp/vars-repro/.github/workflows/test.yml << 'WF'
          name: Test
          on: push
          jobs:
            test:
              runs-on: ubuntu-latest
              env:
                API_URL: ${{ vars.API_URL }}
                DEPLOY_ENV: ${{ vars.DEPLOY_ENV }}
              steps:
                - run: |
                    echo "api=$API_URL"
                    echo "env=$DEPLOY_ENV"
                    [ "$API_URL" = "https://api.example.com" ]
                    [ "$DEPLOY_ENV" = "production" ]
          WF

          cd /tmp/vars-repro
          git init
          git remote add origin https://github.com/test-org/vars-repro.git
          git add -A
          git -c user.name="test" -c user.email="test@test.com" commit -m "init"

      - name: Case 1 — no --var flags → fails fast listing both vars
        working-directory: /tmp/vars-repro
        run: |
          set +e
          out=$(node "$GITHUB_WORKSPACE/packages/cli/dist/cli.js" \
            run --workflow .github/workflows/test.yml --quiet 2>&1)
          rc=$?
          set -e
          echo "$out"
          [ "$rc" -eq 1 ] || { echo "expected exit 1, got $rc"; exit 1; }
          echo "$out" | grep -q "Missing vars required by workflow" || { echo "missing error header"; exit 1; }
          echo "$out" | grep -q -- "--var API_URL=<value>" || { echo "API_URL not listed"; exit 1; }
          echo "$out" | grep -q -- "--var DEPLOY_ENV=<value>" || { echo "DEPLOY_ENV not listed"; exit 1; }
          echo "✅ Case 1 passed"

      - name: Case 2 — partial --var → only still-missing var listed
        working-directory: /tmp/vars-repro
        run: |
          set +e
          out=$(node "$GITHUB_WORKSPACE/packages/cli/dist/cli.js" \
            run --workflow .github/workflows/test.yml --quiet \
            --var API_URL=https://api.example.com 2>&1)
          rc=$?
          set -e
          echo "$out"
          [ "$rc" -eq 1 ] || { echo "expected exit 1, got $rc"; exit 1; }
          echo "$out" | grep -q -- "--var DEPLOY_ENV=<value>" || { echo "DEPLOY_ENV not listed"; exit 1; }
          if echo "$out" | grep -q "API_URL=<value>"; then
            echo "API_URL should not be listed when already supplied"; exit 1;
          fi
          echo "✅ Case 2 passed"

      - name: Case 3 — all --var flags → run proceeds and job succeeds
        working-directory: /tmp/vars-repro
        run: |
          node "$GITHUB_WORKSPACE/packages/cli/dist/cli.js" \
            run --workflow .github/workflows/test.yml --quiet \
            --var API_URL=https://api.example.com \
            --var DEPLOY_ENV=production
          echo "✅ Case 3 passed"
