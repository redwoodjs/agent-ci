name: "Smoke: Secrets (.env.agent-ci + shell env fallback)"

# Exercises the two sources agent-ci resolves `${{ secrets.* }}` from:
#   1. A `.env.agent-ci` file at the project root (primary)
#   2. The shell environment of the process that launched agent-ci (fallback)
#
# Creates a self-contained temp project with both sources populated and runs
# a nested agent-ci workflow that asserts each secret arrived in the step.

on:
  pull_request_target:
    types: [opened, labeled, synchronize]

jobs:
  secrets-resolution:
    if: '!github.event.pull_request.draft && (contains(fromJSON(''["MEMBER", "OWNER", "COLLABORATOR"]''), github.event.pull_request.author_association) || contains(github.event.pull_request.labels.*.name, ''safe-to-run''))'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install

      - name: Build agent-ci
        run: pnpm --filter @redwoodjs/agent-ci... -r build

      - name: Create temp project with secrets
        run: |
          D='$'
          OPEN="${D}{{"
          CLOSE='}}'

          mkdir -p /tmp/secrets-smoke/.github/workflows

          # .env.agent-ci at project root — agent-ci's primary secret source.
          cat > /tmp/secrets-smoke/.env.agent-ci << 'ENV'
          FILE_SECRET=from-env-file
          ENV

          cat > /tmp/secrets-smoke/.github/workflows/test.yml <<WF
          name: Test
          on: push
          jobs:
            verify:
              runs-on: ubuntu-latest
              steps:
                - name: Secret from .env.agent-ci
                  env:
                    GOT_FILE: ${OPEN} secrets.FILE_SECRET ${CLOSE}
                  run: |
                    [ "\$GOT_FILE" = "from-env-file" ] || { echo "❌ FILE_SECRET=\$GOT_FILE"; exit 1; }
                    echo "✅ .env.agent-ci secret resolved"

                - name: Secret from shell env fallback
                  env:
                    GOT_SHELL: ${OPEN} secrets.SHELL_SECRET ${CLOSE}
                  run: |
                    [ "\$GOT_SHELL" = "from-shell-env" ] || { echo "❌ SHELL_SECRET=\$GOT_SHELL"; exit 1; }
                    echo "✅ shell env fallback secret resolved"
          WF

          cd /tmp/secrets-smoke
          git init
          git remote add origin https://github.com/test-org/secrets-smoke.git
          git add -A
          git -c user.name="test" -c user.email="test@test.com" commit -m "init"

      - name: Run nested agent-ci with shell-env secret exported
        working-directory: /tmp/secrets-smoke
        env:
          SHELL_SECRET: from-shell-env
        run: |
          node "$GITHUB_WORKSPACE/packages/cli/dist/cli.js" \
            run --workflow .github/workflows/test.yml --quiet
