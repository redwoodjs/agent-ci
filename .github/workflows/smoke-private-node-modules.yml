name: "Smoke: private node_modules snapshots"

# Regression coverage for #378. The script creates an npm project, leaves a
# legacy partial cache with npm's hidden lockfile, and proves two parallel jobs
# receive different writable node_modules directories.

on:
  pull_request_target:
    types: [opened, labeled, synchronize]

jobs:
  private-node-modules:
    if: '!github.event.pull_request.draft && (contains(fromJSON(''["MEMBER", "OWNER", "COLLABORATOR"]''), github.event.pull_request.author_association) || contains(github.event.pull_request.labels.*.name, ''safe-to-run''))'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.30.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Reproduce parallel npm cache race
        run: ./scripts/repro-378.sh
