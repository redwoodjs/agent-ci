name: "Smoke: .github/agent-ci.Dockerfile runner image"

# Exercises the runner-image customization path documented in
# packages/cli/runner-image.md: when a project has `.github/agent-ci.Dockerfile`
# at its root, agent-ci builds that image and runs every job inside it.
#
# The nested project below bakes a marker file into the custom image at build
# time. The nested workflow asserts the marker is present inside the runner —
# which it only would be if agent-ci picked up the Dockerfile and used the
# resulting image instead of the default `ghcr.io/actions/actions-runner:latest`.
#
# First CI run pays a ~60–90s docker build; subsequent runs reuse the cached
# `agent-ci-runner:<hash>` tag and take ~0s.

on:
  pull_request_target:
    types: [opened, labeled, synchronize]

jobs:
  runner-image-override:
    if: '!github.event.pull_request.draft && (contains(fromJSON(''["MEMBER", "OWNER", "COLLABORATOR"]''), github.event.pull_request.author_association) || contains(github.event.pull_request.labels.*.name, ''safe-to-run''))'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install

      - name: Build agent-ci
        run: pnpm --filter @redwoodjs/agent-ci... -r build

      - name: Create temp project with custom runner Dockerfile
        run: |
          mkdir -p /tmp/runner-image-smoke/.github/workflows

          cat > /tmp/runner-image-smoke/.github/agent-ci.Dockerfile << 'DOCKER'
          FROM ghcr.io/actions/actions-runner:latest
          RUN sudo sh -c 'echo from-custom-image > /usr/local/share/agent-ci-smoke-marker'
          DOCKER

          cat > /tmp/runner-image-smoke/.github/workflows/test.yml << 'WF'
          name: Test
          on: push
          jobs:
            verify:
              runs-on: ubuntu-latest
              steps:
                - name: Marker baked into the custom runner image is present
                  run: |
                    got=$(cat /usr/local/share/agent-ci-smoke-marker 2>/dev/null || echo MISSING)
                    [ "$got" = "from-custom-image" ] || { echo "❌ marker=$got"; exit 1; }
                    echo "✅ custom runner image was used"
          WF

          cd /tmp/runner-image-smoke
          git init
          git remote add origin https://github.com/test-org/runner-image-smoke.git
          git add -A
          git -c user.name="test" -c user.email="test@test.com" commit -m "init"

      - name: Run nested agent-ci (builds custom image on first invocation)
        working-directory: /tmp/runner-image-smoke
        run: |
          node "$GITHUB_WORKSPACE/packages/cli/dist/cli.js" \
            run --workflow .github/workflows/test.yml --quiet
