<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OA - Commits</title>
    <link rel="stylesheet" href="commits.css" />
  </head>
  <body>
    <div class="titlebar" style="justify-content: space-between">
      <div style="display: flex; align-items: center">
        <button
          class="btn"
          id="back-btn"
          style="height: 24px; padding: 0 8px; margin-right: 12px; font-size: 12px"
        >
          ← Back
        </button>
        <span id="repo-name-display">Repository Name</span>
      </div>
      <div style="display: flex; align-items: center; gap: 16px">
        <div style="display: flex; align-items: center; gap: 8px">
          <span style="font-size: 13px; color: var(--text-secondary); font-weight: bold"
            >Run on commit:</span
          >
          <button
            id="watch-mode-toggle"
            class="btn"
            style="
              padding: 4px 12px;
              font-size: 12px;
              background: #333;
              color: white;
              border: none;
              border-radius: 4px;
              cursor: pointer;
            "
          >
            Off
          </button>
        </div>
        <div
          id="dtu-status"
          class="status-badge status-Unknown"
          style="cursor: pointer; user-select: none"
        >
          DTU: Checking...
        </div>
      </div>
    </div>
    <div class="pane-container animate-fade-in">
      <div class="pane-left">
        <div class="pane-header">Branches</div>
        <div
          id="branches-list"
          style="padding: 16px; display: flex; flex-direction: column; gap: 8px"
        >
          <!-- Populated by JS -->
        </div>
      </div>
      <div class="pane-right">
        <div class="pane-header" id="current-branch-header">Commits</div>
        <div
          id="commits-list"
          style="padding: 16px; display: flex; flex-direction: column; gap: 8px"
        >
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
    <script src="commits.js"></script>
  </body>
</html>
